services:
  trakt-to-letterboxd:
    container_name: trakt-to-letterboxd
    image: louiscrc/trakt-to-letterboxd:latest
    build: .
    environment:
      - RUN_ON_START=true
      - TZ=Europe/Zurich
      - IN_DOCKER=true
      - SCHEDULED=true
      - CRON_SCHEDULE=0 0 * * * 
      - AUTO_IMPORT=true    
      - HEADLESS_IMPORT=true
    volumes:
      - ./config.yml:/app/config/config.yml        
      - ./csv:/csv             
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 5m
      timeout: 10s
      retries: 1
      start_period: 1h
    restart: unless-stopped
